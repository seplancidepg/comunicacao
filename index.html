<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meu Relatório Power BI</title>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%;
            overflow: hidden; 
            background-color: #eaeaea;
        }
        #container {
            width: 100vw;
            height: 100vh;
        }
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
        }
    </style>
</head>
<body>

<div id="container"></div>

<script>
    // ✅ LINKS CORRETOS (Publicar na Web + página específica)
    const linkDesktop = "https://app.powerbi.com/view?r=eyJrIjoiNTk4MWE1NDEtZjMxZi00Y2ZiLTg1MzEtZmRjNmVmZGU4YjM2IiwidCI6ImJkOTFhMDZhLTAzMGMtNDBiNC1hMWUzLTE5Y2Y4ODE0Zjk2MCJ9";

    const linkMobile = "https://app.powerbi.com/view?r=eyJrIjoiMDc4MTg1MmMtODljNi00Zjc2LThmYzgtYTdiNzU3MWJiMGYwIiwidCI6ImJkOTFhMDZhLTAzMGMtNDBiNC1hMWUzLTE5Y2Y4ODE0Zjk2MCJ9";

    function carregarRelatorio() {
        const container = document.getElementById('container');
        const larguraTela = window.innerWidth;
        let urlFinal = "";

        // Mantive sua lógica (largura da tela)
        if (larguraTela < 768) {
            urlFinal = linkMobile;
        } else {
            urlFinal = linkDesktop;
        }

        container.innerHTML = `<iframe src="${urlFinal}" allowfullscreen="true"></iframe>`;
    }

    carregarRelatorio();

    // Atualiza ao girar celular
    window.addEventListener('orientationchange', function() {
        location.reload();
    });
</script>

</body>
</html>
