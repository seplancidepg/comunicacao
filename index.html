<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meu Relatório Power BI</title>
    <style>
        /* Garante que o container ocupe a tela inteira sem barras de rolagem do navegador */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%;
            overflow: hidden; 
            background-color: #eaeaea; /* Cor de fundo opcional */
        }
        #container {
            width: 100vw;
            height: 100vh;
        }
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
        }
    </style>
</head>
<body>

    <div id="container"></div>

    <script>
        // Adicionei os parâmetros ?pageView=fitToWidth para forçar o preenchimento da tela
        const linkDesktop = "https://app.powerbi.com/groups/c45cfb36-b33f-4e6e-aa7c-7db934d65cad/reports/4753b6dd-02ad-4771-9ca9-20869314e780/5dd4a295c271bb136c15?experience=power-bi";
        const linkMobile = "https://app.powerbi.com/groups/c45cfb36-b33f-4e6e-aa7c-7db934d65cad/reports/4753b6dd-02ad-4771-9ca9-20869314e780/4923792c5c26683d7b84?experience=power-bi";

        function carregarRelatorio() {
            const container = document.getElementById('container');
            const larguraTela = window.innerWidth;
            let urlFinal = "";

            // Detecção mobile baseada em largura (768px é o padrão tablet/mobile)
            if (larguraTela < 768) {
                urlFinal = linkMobile;
            } else {
                urlFinal = linkDesktop;
            }

            container.innerHTML = `<iframe src="${urlFinal}" allowFullScreen="true"></iframe>`;
        }

        carregarRelatorio();

        // Faz o ajuste se o usuário girar o celular
        window.addEventListener('orientationchange', function() {
            location.reload();
        });
    </script>
</body>
</html>
